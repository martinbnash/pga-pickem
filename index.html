<!DOCTYPE html>
<html>
<head>
  <title>2026 PGA Pickem</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .section {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    .leaderboard th {
      background: #1565c0;
    }

    .score-under {
      color: green;
      font-weight: bold;
    }

    .score-over {
      color: red;
      font-weight: bold;
    }

    .score-even {
      color: #555;
      font-weight: bold;
    }

    .highlight-bottom {
      background-color: #bbdefb;
      font-weight: bold;
      border-top: 3px solid #1976d2;
    }
  </style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<div class="section">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable" class="leaderboard"></table>
</div>

<div class="section">
  <h2>The Masters Picks</h2>
  <table id="mastersTable"></table>
</div>

<script>

// ✅ Convert score to number
function parseScore(score) {
  if (!score) return 999;
  if (score === "E") return 0;
  return parseInt(score.replace("+", "").trim());
}


// ✅ LEADERBOARD (AUTO FIXED)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMastersLeaderboard")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("leaderboardTable");
    table.innerHTML = "";

    let rows = data.slice(0, 8);
    const keys = Object.keys(rows[0]);

    // 🔥 Detect which column is score
    let scoreKey, nameKey;

    keys.forEach(k => {
      const val = rows[0][k];

      if (typeof val === "string" && (val.includes("-") || val.includes("+") || val === "E")) {
        scoreKey = k;
      }
    });

    // fallback if needed
    if (!scoreKey) scoreKey = keys[1];

    nameKey = keys.find(k => k !== scoreKey);

    // 🔥 SORT
    rows.sort((a, b) => parseScore(a[scoreKey]) - parseScore(b[scoreKey]));

    // HEADER
    const headerRow = document.createElement("tr");

    const thName = document.createElement("th");
    thName.textContent = nameKey;

    const thScore = document.createElement("th");
    thScore.textContent = scoreKey;

    headerRow.appendChild(thName);
    headerRow.appendChild(thScore);
    table.appendChild(headerRow);

    // ROWS
    rows.forEach(row => {
      const tr = document.createElement("tr");

      const tdName = document.createElement("td");
      tdName.textContent = row[nameKey] || "";

      const tdScore = document.createElement("td");
      tdScore.textContent = row[scoreKey] || "";

      tr.appendChild(tdName);
      tr.appendChild(tdScore);

      table.appendChild(tr);
    });

  });


// ✅ MASTERS PICKS (UNCHANGED)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMasters")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("mastersTable");
    table.innerHTML = "";

    const rows = data.slice(0, 16);
    const headers = Object.keys(rows[0]).slice(0, 8);

    const picks = rows.slice(0, 8);
    const scores = rows.slice(8, 16);

    const headerRow = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    picks.forEach((pickRow, i) => {
      const scoreRow = scores[i] || {};
      const tr = document.createElement("tr");

      const isLastRow = i === picks.length - 1;

      if (isLastRow) {
        tr.classList.add("highlight-bottom");
      }

      headers.forEach(h => {
        const td = document.createElement("td");

        const player = pickRow[h] || "";
        const score = scoreRow[h] || "";

        if (isLastRow) {
          td.textContent = player;
        } else {
          if (score) {
            const span = document.createElement("span");

            let scoreClass = "score-even";

            if (score.includes("-")) scoreClass = "score-under";
            else if (score.includes("+")) scoreClass = "score-over";
            else if (score === "E" || score === "0") scoreClass = "score-even";

            span.className = scoreClass;
            span.textContent = ` (${score})`;

            td.textContent = player;
            td.appendChild(span);
          } else {
            td.textContent = player;
          }
        }

        tr.appendChild(td);
      });

      table.appendChild(tr);
    });

  });

</script>

</body>
</html>
