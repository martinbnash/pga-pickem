<!DOCTYPE html>
<html>
<head>
  <title>2026 PGA Pickem</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .section {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    .leaderboard th {
      background: #1565c0;
    }

    .score-under {
      color: green;
      font-weight: bold;
    }

    .score-over {
      color: red;
      font-weight: bold;
    }

    .score-even {
      color: #555;
      font-weight: bold;
    }

    .highlight-bottom {
      background-color: #bbdefb;
      font-weight: bold;
      border-top: 3px solid #1976d2;
    }
  </style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<!-- Leaderboard -->
<div class="section">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable" class="leaderboard"></table>
</div>

<!-- Masters Picks -->
<div class="section">
  <h2>The Masters Picks</h2>
  <table id="mastersTable"></table>
</div>

<script>

// ✅ LEADERBOARD (A1:B8 EXACT, NO HEADER, NO SORT)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMastersLeaderboard")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("leaderboardTable");
    table.innerHTML = "";

    const rows = data.slice(0, 8);

    rows.forEach(row => {
      const tr = document.createElement("tr");

      // 🔥 FORCE column order using VALUES (not keys)
      const values = Object.values(row);

      const name = values[0] || "";
      const score = values[1] || "";

      const tdName = document.createElement("td");
      tdName.textContent = name;

      const tdScore = document.createElement("td");
      tdScore.textContent = score;

      tr.appendChild(tdName);
      tr.appendChild(tdScore);

      table.appendChild(tr);
    });

  });

// ✅ MASTERS PICKS (UNCHANGED)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMasters")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("mastersTable");
    table.innerHTML = "";

    const rows = data.slice(0, 16);
    const headers = Object.keys(rows[0]).slice(0, 8);

    const picks = rows.slice(0, 8);
    const scores = rows.slice(8, 16);

    const headerRow = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    picks.forEach((pickRow, i) => {
      const scoreRow = scores[i] || {};
      const tr = document.createElement("tr");

      const isLastRow = i === picks.length - 1;

      if (isLastRow) {
        tr.classList.add("highlight-bottom");
      }

      headers.forEach(h => {
        const td = document.createElement("td");

        const player = pickRow[h] || "";
        const score = scoreRow[h] || "";

        if (isLastRow) {
          td.textContent = player;
        } else {
          if (score) {
            const span = document.createElement("span");

            let scoreClass = "score-even";

            if (score.includes("-")) scoreClass = "score-under";
            else if (score.includes("+")) scoreClass = "score-over";
            else if (score === "E" || score === "0") scoreClass = "score-even";

            span.className = scoreClass;
            span.textContent = ` (${score})`;

            td.textContent = player;
            td.appendChild(span);
          } else {
            td.textContent = player;
          }
        }

        tr.appendChild(td);
      });

      table.appendChild(tr);
    });

  });

</script>

</body>
</html>
