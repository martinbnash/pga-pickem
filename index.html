<!DOCTYPE html>
<html>
<head>
  <title>2026 PGA Pickem</title>
  <style>

    .highlight-row {
  background-color: #ffe082;
  font-weight: bold;
  border-top: 2px solid #f9a825;
}
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .section {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    .leaderboard th {
      background: #1565c0;
    }
  </style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<!-- Leaderboard -->
<div class="section">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable" class="leaderboard"></table>
</div>

<!-- Masters Picks -->
<div class="section">
  <h2>The Masters Picks</h2>
  <table id="mastersTable"></table>
</div>

<script>

function renderTable(elementId, data, limitRows = null, limitCols = null) {
  const table = document.getElementById(elementId);
  table.innerHTML = "";

  // Remove bad/empty rows
  data = data.filter(row => row && Object.values(row).some(v => v));

  // Limit rows
  if (limitRows) data = data.slice(0, limitRows);

  // Get headers safely
  let headers = Object.keys(data[0] || {});

  // Limit columns
  if (limitCols) headers = headers.slice(0, limitCols);

  // 🛑 If no headers, stop (prevents broken layout)
  if (headers.length === 0) {
    table.innerHTML = "<tr><td>No data</td></tr>";
    return;
  }

  // Header row
  const headerRow = document.createElement("tr");
  headers.forEach(h => {
    const th = document.createElement("th");
    th.textContent = h || "";
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);

  // Data rows
 data.forEach((row, index) => {
  const tr = document.createElement("tr");

  // Highlight 8th row (index 8)
  if (index === 6 && elementId === "mastersTable") {
    tr.classList.add("highlight-row");
  }
    headers.forEach(h => {
      const td = document.createElement("td");
      td.textContent = row[h] || "";
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}
// Leaderboard (A1:B8)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMastersLeaderboard")
  .then(res => res.json())
  .then(data => renderTable("leaderboardTable", data, 8, 2));

// Masters Picks (A1:H16)
// Masters Picks (with scores combined)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMasters")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("mastersTable");
    table.innerHTML = "";

    const rows = data.slice(0, 16);
    const headers = Object.keys(rows[0]).slice(0, 8);

    const picks = rows.slice(1, 9);   // A2–A9
    const scores = rows.slice(9, 17); // A10–A17

    // Header row
    const headerRow = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    // Combine picks + scores
    picks.forEach((pickRow, i) => {
      const scoreRow = scores[i] || {};
      const tr = document.createElement("tr");

      headers.forEach(h => {
        const td = document.createElement("td");

        const player = pickRow[h] || "";
        const score = scoreRow[h] || "";

        td.textContent = score ? `${player} (${score})` : player;

        tr.appendChild(td);
      });

      table.appendChild(tr);
    });

  });

</script>

</body>
</html>
