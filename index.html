<!DOCTYPE html>
<html>
<head>
  <title>2026 PGA Pickem</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .section {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    .leaderboard th {
      background: #1565c0;
    }

    .score-under {
      color: green;
      font-weight: bold;
    }

    .score-over {
      color: red;
      font-weight: bold;
    }

    .score-even {
      color: #555;
      font-weight: bold;
    }

    .highlight-bottom {
      background-color: #bbdefb;
      font-weight: bold;
      border-top: 3px solid #1976d2;
    }
  </style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<!-- Leaderboard -->
<div class="section">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable" class="leaderboard"></table>
</div>

<!-- Masters Picks -->
<div class="section">
  <h2>The Masters Picks</h2>
  <table id="mastersTable"></table>
</div>

<!-- Live Masters Leaderboard -->
<div class="section">
  <h2>🏆 Live Masters Leaderboard</h2>
  <table id="liveMastersTable"></table>
</div>

<script>

// ✅ LEADERBOARD (SORTED LOW → HIGH)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMastersLeaderboard")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("leaderboardTable");
    table.innerHTML = "";

    const rows = data.slice(0, 8);
    const keys = Object.keys(rows[0]);

    function parseScore(score) {
      if (!score) return 999;
      if (score === "E") return 0;
      return parseInt(score.replace("+", "").trim());
    }

    rows.sort((a, b) => parseScore(a[keys[1]]) - parseScore(b[keys[1]]));

    rows.forEach((row, i) => {
      const tr = document.createElement("tr");

      const name = row[keys[0]] || "";
      const score = row[keys[1]] || "";

      const tdName = document.createElement("td");
      tdName.textContent = `${i + 1}. ${name}`;

      const tdScore = document.createElement("td");
      tdScore.textContent = score;

      if (score.includes("-")) tdScore.classList.add("score-under");
      else if (score.includes("+")) tdScore.classList.add("score-over");
      else if (score === "E") tdScore.classList.add("score-even");

      tr.appendChild(tdName);
      tr.appendChild(tdScore);

      table.appendChild(tr);
    });

  });


// ✅ MASTERS PICKS (UNCHANGED)
fetch("https://opensheet.elk.sh/164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0/TheMasters")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("mastersTable");
    table.innerHTML = "";

    const rows = data.slice(0, 16);
    const headers = Object.keys(rows[0]).slice(0, 8);

    const picks = rows.slice(0, 8);
    const scores = rows.slice(8, 16);

    const headerRow = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    picks.forEach((pickRow, i) => {
      const scoreRow = scores[i] || {};
      const tr = document.createElement("tr");

      const isLastRow = i === picks.length - 1;

      if (isLastRow) {
        tr.classList.add("highlight-bottom");
      }

      headers.forEach(h => {
        const td = document.createElement("td");

        const player = pickRow[h] || "";
        const score = scoreRow[h] || "";

        if (isLastRow) {
          td.textContent = player;
        } else {
          if (score) {
            const span = document.createElement("span");

            let scoreClass = "score-even";

            if (score.includes("-")) scoreClass = "score-under";
            else if (score.includes("+")) scoreClass = "score-over";
            else if (score === "E" || score === "0") scoreClass = "score-even";

            span.className = scoreClass;
            span.textContent = ` (${score})`;

            td.textContent = player;
            td.appendChild(span);
          } else {
            td.textContent = player;
          }
        }

        tr.appendChild(td);
      });

      table.appendChild(tr);
    });

  });


// ✅ LIVE MASTERS LEADERBOARD (REAL AUGUSTA DATA)
fetch("https://www.masters.com/en_US/scores/feeds/2026/scores.json")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("liveMastersTable");
    table.innerHTML = "";

    const players = data.players.slice(0, 15);

    // Header
    const headerRow = document.createElement("tr");
    ["Pos", "Player", "Score", "Thru"].forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    table.appendChild(headerRow);

    players.forEach(p => {
      const tr = document.createElement("tr");

      const name = `${p.first_name} ${p.last_name}`;
      const score = p.total;
      const pos = p.pos;
      const thru = p.thru;

      const tdPos = document.createElement("td");
      tdPos.textContent = pos;

      const tdName = document.createElement("td");
      tdName.textContent = name;

      const tdScore = document.createElement("td");
      tdScore.textContent = score;

      const tdThru = document.createElement("td");
      tdThru.textContent = thru;

      // color scores
      if (score.includes("-")) tdScore.classList.add("score-under");
      else if (score.includes("+")) tdScore.classList.add("score-over");
      else if (score === "E") tdScore.classList.add("score-even");

      tr.appendChild(tdPos);
      tr.appendChild(tdName);
      tr.appendChild(tdScore);
      tr.appendChild(tdThru);

      table.appendChild(tr);
    });

  })
  .catch(err => console.error("Masters data error:", err));

// 🔄 AUTO REFRESH EVERY 30 SECONDS
setInterval(() => location.reload(), 30000);

</script>

</body>
</html>
