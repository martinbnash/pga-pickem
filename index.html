<!DOCTYPE html>
<html>
<head>
<title>2026 PGA Pickem</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.section{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
font-size:13px;
}

th{
background:#2e7d32;
color:white;
}

.leaderboard th{
background:#1565c0;
}

.score-under{
color:green;
font-weight:bold;
}

.score-over{
color:red;
font-weight:bold;
}

.score-even{
color:#555;
font-weight:bold;
}

.highlight-bottom{
background:#bbdefb;
font-weight:bold;
border-top:3px solid #1976d2;
}
</style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<div class="section">
<h2>PGA Championship Standings</h2>
<table id="pgaLeaderboardTable" class="leaderboard"></table>
</div>

<div class="section">
<h2>PGA Championship Picks</h2>
<table id="pgaTable"></table>
</div>

<div class="section">
<h2>Overall Standings</h2>
<table id="overallTable" class="leaderboard"></table>
</div>

<div class="section">
<h2>Masters Standings</h2>
<table id="mastersLeaderboardTable" class="leaderboard"></table>
</div>

<script>

const mastersSheet="164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0";
const pgaSheet="1utaYKVonOSXZTsx6I1gbj_wSmUAPDUZZLy9XGRZ0aAc";

function parseScore(score){
  if(!score) return 999;
  if(score==="E") return 0;
  return parseInt(score.replace("+",""))||999;
}

function normalizeScore(score){
  if(!score) return 0;
  if(score==="E") return 0;
  return parseInt(score.replace("+",""))||0;
}

function applyScoreClass(td,score){

 if(score.includes("-"))
    td.classList.add("score-under");

 else if(score.includes("+"))
    td.classList.add("score-over");

 else
    td.classList.add("score-even");

}

function drawLeaderboard(data,tableID){

const table=document.getElementById(tableID);

table.innerHTML="";

if(!data.length){
 table.innerHTML="<tr><td>No data</td></tr>";
 return;
}

const keys=Object.keys(data[0]);

data.sort(
(a,b)=>
parseScore(a[keys[1]])
-
parseScore(b[keys[1]])
);

data.slice(0,8).forEach((row,i)=>{

const tr=document.createElement("tr");

const name=row[keys[0]]||"";

const score=row[keys[1]]||"";

const td1=document.createElement("td");

td1.textContent=
`${i+1}. ${name}`;

const td2=document.createElement("td");

td2.textContent=score;

applyScoreClass(td2,score);

tr.append(td1,td2);

table.appendChild(tr);

});

}


function drawPicks(data){

const table=document.getElementById("pgaTable");

table.innerHTML="";

if(!data.length){
table.innerHTML="<tr><td>No data</td></tr>";
return;
}

const headers=
Object.keys(data[0]).slice(0,8);

const picks=data.slice(0,8);

const scores=data.slice(8,16);

const hr=document.createElement("tr");

headers.forEach(h=>{

const th=document.createElement("th");

th.textContent=h;

hr.appendChild(th);

});

table.appendChild(hr);

picks.forEach((pickRow,i)=>{

const row=document.createElement("tr");

const scoreRow=scores[i]||{};

headers.forEach(h=>{

const td=document.createElement("td");

const player=
pickRow[h]||"";

const score=
scoreRow[h]||"";

if(score){

td.innerHTML=
`${player}
<span>(${score})</span>`;

}else{

td.textContent=player;

}

row.appendChild(td);

});

table.appendChild(row);

});

}


// PGA standings
fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChampLeaderboard`)
.then(r=>r.json())
.then(d=>drawLeaderboard(
d,
"pgaLeaderboardTable"
));


// PGA picks
fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChamp`)
.then(r=>r.json())
.then(d=>drawPicks(d));


// Masters standings
fetch(`https://opensheet.elk.sh/${mastersSheet}/TheMastersLeaderboard`)
.then(r=>r.json())
.then(d=>drawLeaderboard(
d,
"mastersLeaderboardTable"
));



// OVERALL

Promise.all([

fetch(`https://opensheet.elk.sh/${mastersSheet}/TheMastersLeaderboard`)
.then(r=>r.json()),

fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChampLeaderboard`)
.then(r=>r.json())

])

.then(([masters,pga])=>{

const total={};

masters.forEach(r=>{

const k=
Object.keys(r);

total[r[k[0]]]=
normalizeScore(
r[k[1]]
);

});

pga.forEach(r=>{

const k=
Object.keys(r);

const player=
r[k[0]];

const score=
normalizeScore(
r[k[1]]
);

total[player]=
(total[player]||0)
+
score;

});

const sorted=
Object.entries(total)
.sort((a,b)=>a[1]-b[1]);

const table=
document.getElementById(
"overallTable"
);

sorted.forEach((p,i)=>{

const tr=
document.createElement("tr");

const td1=
document.createElement("td");

td1.textContent=
`${i+1}. ${p[0]}`;

const td2=
document.createElement("td");

td2.textContent=
p[1]>0
?`+${p[1]}`
:p[1];

applyScoreClass(
td2,
td2.textContent
);

tr.append(
td1,
td2
);

table.appendChild(tr);

});

});

setInterval(
()=>location.reload(),
30000
);

</script>

</body>
</html>
