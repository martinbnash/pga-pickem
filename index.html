<!DOCTYPE html>
<html>
<head>
<title>2026 PGA Pickem</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.section{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
font-size:13px;
}

th{
background:#2e7d32;
color:white;
}

.leaderboard th{
background:#1565c0;
}

.score-under{
color:green;
font-weight:bold;
}

.score-over{
color:red;
font-weight:bold;
}

.score-even{
color:#555;
font-weight:bold;
}

.highlight-bottom{
background:#bbdefb;
font-weight:bold;
border-top:3px solid #1976d2;
}

</style>
</head>

<body>

<h1>🏌️ 2026 PGA Pickem</h1>

<div class="section">
<h2>PGA Championship Standings</h2>
<table id="pgaLeaderboardTable" class="leaderboard"></table>
</div>

<div class="section">
<h2>PGA Championship Picks</h2>
<table id="pgaTable"></table>
</div>

<div class="section">
<h2>Overall Standings</h2>
<table id="overallTable" class="leaderboard"></table>
</div>

<div class="section">
<h2>Masters Standings</h2>
<table id="mastersLeaderboardTable" class="leaderboard"></table>
</div>

<script>

const mastersSheet="164Znr317Kgm4lKudK1HZ7-JbPg8LW8AOCEjOEZ90Xk0";

const pgaSheet="1utaYKVonOSXZTsx6I1gbj_wSmUAPDUZZLy9XGRZ0aAc";

function parseScore(score){

  if(score === undefined || score === null || score === "")
    return 999;

  score = score.toString().trim();

  if(score === "E")
    return 0;

  return parseInt(score.replace("+","")) || 999;

}

function normalizeScore(score){

  if(score === undefined || score === null || score === "")
    return 0;

  score = score.toString().trim();

  if(score === "E")
    return 0;

  return parseInt(score.replace("+","")) || 0;

}

function applyScoreClass(td,score){

 score = score.toString();

 if(score.includes("-"))
    td.classList.add("score-under");

 else if(score.includes("+"))
    td.classList.add("score-over");

 else
    td.classList.add("score-even");

}

function formatScore(score){

 if(score > 0)
    return `+${score}`;

 if(score === 0)
    return "E";

 return score;

}

function drawLeaderboard(data,tableID){

const table=document.getElementById(tableID);

table.innerHTML="";

if(!data.length){

 table.innerHTML="<tr><td>No data</td></tr>";

 return;

}

const keys=Object.keys(data[0]);

// Header
const header=document.createElement("tr");

const th1=document.createElement("th");
th1.textContent="Player";

const th2=document.createElement("th");
th2.textContent="Score";

header.append(th1,th2);

table.appendChild(header);

// Sort
data.sort(
(a,b)=>
parseScore(a[keys[1]])
-
parseScore(b[keys[1]])
);

// Rows
data.slice(0,8).forEach((row,i)=>{

const tr=document.createElement("tr");

const name=row[keys[0]] || "";

const score=row[keys[1]] || "";

const td1=document.createElement("td");

td1.textContent=
`${i+1}. ${name}`;

const td2=document.createElement("td");

td2.textContent=score;

applyScoreClass(td2,score);

tr.append(td1,td2);

table.appendChild(tr);

});

}

function drawPicks(data){

const table=document.getElementById("pgaTable");

table.innerHTML="";

if(!data.length){

table.innerHTML="<tr><td>No data</td></tr>";

return;

}

const headers=
Object.keys(data[0]).slice(0,8);

const picks=data.slice(0,8);

const scores=data.slice(8,16);

// Header Row
const hr=document.createElement("tr");

headers.forEach(h=>{

const th=document.createElement("th");

th.textContent=h;

hr.appendChild(th);

});

table.appendChild(hr);

// Data Rows
picks.forEach((pickRow,i)=>{

const row=document.createElement("tr");

const scoreRow=scores[i] || {};

headers.forEach(h=>{

const td=document.createElement("td");

const player=pickRow[h] || "";

const score=scoreRow[h] || "";

if(score){

td.innerHTML=
`${player}<br>
<span style="font-weight:bold;">(${score})</span>`;

}else{

td.textContent=player;

}

row.appendChild(td);

});

table.appendChild(row);

});

}

// PGA standings
fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChampLeaderboard`)
.then(r=>r.json())
.then(d=>drawLeaderboard(
d,
"pgaLeaderboardTable"
));

// PGA picks
fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChamp`)
.then(r=>r.json())
.then(d=>drawPicks(d));

// Masters standings
fetch(`https://opensheet.elk.sh/${mastersSheet}/TheMastersLeaderboard`)
.then(r=>r.json())
.then(d=>drawLeaderboard(
d,
"mastersLeaderboardTable"
));

// OVERALL STANDINGS

Promise.all([

fetch(`https://opensheet.elk.sh/${mastersSheet}/TheMastersLeaderboard`)
.then(r=>r.json()),

fetch(`https://opensheet.elk.sh/${pgaSheet}/PGAChampLeaderboard`)
.then(r=>r.json())

])

.then(([masters,pga])=>{

const total={};

// Masters
masters.forEach(r=>{

const k=Object.keys(r);

const player=r[k[0]];

const score=
normalizeScore(r[k[1]]);

total[player]=score;

});

// PGA
pga.forEach(r=>{

const k=Object.keys(r);

const player=r[k[0]];

const score=
normalizeScore(r[k[1]]);

// Fix for 0 scores
if(total[player] === undefined){

total[player]=0;

}

total[player]+=score;

});

// Sort ascending
const sorted=
Object.entries(total)
.sort((a,b)=>a[1]-b[1]);

const table=
document.getElementById("overallTable");

// Clear old data
table.innerHTML="";

// Header
const header=document.createElement("tr");

const th1=document.createElement("th");
th1.textContent="Player";

const th2=document.createElement("th");
th2.textContent="Total";

header.append(th1,th2);

table.appendChild(header);

// Rows
sorted.forEach((p,i)=>{

const tr=
document.createElement("tr");

const td1=
document.createElement("td");

td1.textContent=
`${i+1}. ${p[0]}`;

const td2=
document.createElement("td");

td2.textContent=
formatScore(p[1]);

applyScoreClass(
td2,
td2.textContent
);

tr.append(
td1,
td2
);

table.appendChild(tr);

});

})

.catch(err=>{

console.error(err);

});

// Auto refresh every 30 seconds
setInterval(
()=>location.reload(),
30000
);

</script>

</body>
</html>
